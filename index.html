<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSMX Webhook Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid #334155;
        }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        p { color: #94a3b8; }
        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #064e3b;
            color: #4ade80;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: bold;
            margin-top: 1rem;
        }
        .link {
            margin-top: 1.5rem;
            padding: 10px;
            background: #1e293b;
            border-radius: 5px;
            font-family: monospace;
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💎 ARSMX Protocol</h1>
        <p>Vercel Webhook Server is active and running.</p>
        <div class="status">● ONLINE</div>
        <div class="link">Webhook URL: /webhook</div>
    </div>
</body>
</html>
